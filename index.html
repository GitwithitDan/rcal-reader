<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.rcal Reader — rcal.dtdm.us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0D1117;
    --surface:  #161B22;
    --surface2: #21262D;
    --border:   #30363D;
    --blue:     #4A8FE7;
    --blue-dim: #1F3A5F;
    --amber:    #E3B341;
    --text:     #E6EDF3;
    --muted:    #8B949E;
    --green:    #3FB950;
    --purple:   #BC8CFF;
    --red:      #F85149;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--blue);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
  }
  .logo-text span { color: var(--text); }

  /* ── Drop Zone ── */
  #dropZone {
    margin: 40px auto;
    max-width: 680px;
    padding: 0 24px;
  }
  .drop-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .drop-area:hover, .drop-area.drag-over {
    border-color: var(--blue);
    background: rgba(74,143,231,0.04);
  }
  .drop-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .drop-area h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .drop-area p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .drop-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .btn-upload {
    display: inline-block;
    padding: 8px 18px;
    background: var(--blue);
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: var(--sans);
    transition: opacity 0.15s;
  }
  .btn-upload:hover { opacity: 0.85; }

  .divider-row {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 16px;
    color: var(--muted); font-size: 12px;
  }
  .divider-row::before, .divider-row::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .paste-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.15s;
  }
  .paste-area:focus { border-color: var(--blue); }
  .paste-area::placeholder { color: var(--muted); }

  .parse-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .parse-btn:hover { background: var(--blue-dim); border-color: var(--blue); }

  .error-msg {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 6px;
    color: var(--red);
    font-size: 12px;
    font-family: var(--mono);
    display: none;
  }

  /* ── Viewer ── */
  #viewer { display: none; }

  .strand-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }
  .strand-header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .strand-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .strand-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 6px;
  }
  .meta-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .meta-pill.live {
    border-color: var(--green);
    color: var(--green);
  }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-reset:hover { border-color: var(--text); color: var(--text); }

  /* ── Tab Toggle ── */
  .view-controls {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .tab-group {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    padding: 6px 16px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active {
    background: var(--blue);
    color: #fff;
  }

  .event-count {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Content area ── */
  .content-area {
    max-width: 900px;
    margin: 20px auto 60px;
    padding: 0 24px;
  }

  /* ── LIST VIEW ── */
  #listView {}

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .event-card-header {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .event-card-header:hover { background: rgba(255,255,255,0.02); }

  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .event-name {
    font-weight: 600;
    font-size: 14px;
    flex: 1;
  }
  .event-schedule-summary {
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    margin-top: 2px;
  }
  .event-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .vibe-tag {
    padding: 1px 7px;
    border-radius: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .expand-icon {
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.15s;
  }
  .event-card.open .expand-icon { transform: rotate(90deg); }

  .event-card-body {
    display: none;
    padding: 0 16px 16px 36px;
    border-top: 1px solid var(--border);
  }
  .event-card.open .event-card-body { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 4px 12px;
    margin-top: 12px;
  }
  .detail-label {
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    padding-top: 1px;
  }
  .detail-value {
    font-size: 12px;
    color: var(--text);
  }
  .detail-value.mono { font-family: var(--mono); }

  .occurrences-title {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 14px 0 8px;
  }
  .occurrence-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .occ-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text);
  }
  .occ-chip.past { opacity: 0.4; }
  .occ-chip.exception {
    border-color: var(--red);
    color: var(--red);
    text-decoration: line-through;
  }
  .occ-chip.modified {
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ── CALENDAR VIEW ── */
  #calView { display: none; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-month-label {
    font-size: 15px;
    font-weight: 600;
  }
  .cal-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .cal-nav-btn:hover { border-color: var(--blue); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-day-header {
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .cal-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-height: 80px;
    padding: 6px;
    position: relative;
  }
  .cal-cell.other-month { opacity: 0.3; }
  .cal-cell.today { border-color: var(--blue); }
  .cal-date-num {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 4px;
  }
  .cal-cell.today .cal-date-num {
    color: var(--blue);
    font-weight: 600;
  }
  .cal-event-pill {
    display: block;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    color: #fff;
  }
  .cal-event-pill:hover { opacity: 0.85; }
  .cal-more {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    cursor: pointer;
  }
  .cal-more:hover { color: var(--blue); }

  /* Tooltip */
  .tooltip {
    position: fixed;
    z-index: 999;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    max-width: 240px;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .tooltip-name { font-weight: 600; margin-bottom: 4px; }
  .tooltip-detail { color: var(--muted); font-size: 11px; font-family: var(--mono); }

  /* Category colors */
  .cat-music      { background: #4A8FE7; }
  .cat-food_drink { background: #E3B341; }
  .cat-fitness    { background: #3FB950; }
  .cat-arts       { background: #BC8CFF; }
  .cat-education  { background: #58A6FF; }
  .cat-community  { background: #79C0FF; }
  .cat-market     { background: #FFA657; }
  .cat-sport      { background: #FF7B72; }
  .cat-comedy     { background: #FFD700; }
  .cat-theater    { background: #D2A8FF; }
  .cat-spiritual  { background: #A5D6FF; }
  .cat-maintenance{ background: #8B949E; }
  .cat-personal   { background: #F0883E; }
  .cat-general    { background: #6E7681; }

  @media (max-width: 600px) {
    .cal-cell { min-height: 56px; }
    .cal-event-pill { display: none; }
    .cal-cell.has-events::after {
      content: '';
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      margin: 2px auto 0;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">.rc</div>
  <div class="logo-text"><span>.rcal</span> reader</div>
</header>

<!-- DROP ZONE -->
<div id="dropZone">
  <div class="drop-area" id="dropArea">
    <div class="drop-icon">📅</div>
    <h2>Drop an .rcal file</h2>
    <p>Drag and drop, or choose a file from your device</p>
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Choose file</button>
    <input type="file" id="fileInput" accept=".rcal,.json">
  </div>

  <div class="divider-row">or paste JSON</div>

  <textarea class="paste-area" id="pasteArea" placeholder='{ "rcal": "0.1", "events": [ ... ] }'></textarea>
  <button class="parse-btn" id="parseBtn">Parse →</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <div class="strand-header">
    <div class="strand-header-inner">
      <div>
        <div class="strand-title" id="strandTitle">Untitled Strand</div>
        <div id="strandDesc" style="color:var(--muted);font-size:13px;margin-top:2px;"></div>
        <div class="strand-meta" id="strandMeta"></div>
      </div>
      <button class="btn-reset" id="resetBtn">← Load another</button>
    </div>
  </div>

  <div class="view-controls">
    <div class="tab-group">
      <button class="tab-btn active" id="tabList" onclick="setView('list')">☰ List</button>
      <button class="tab-btn" id="tabCal" onclick="setView('cal')">▦ Calendar</button>
    </div>
    <div class="event-count" id="eventCount"></div>
  </div>

  <div class="content-area">
    <div id="listView"></div>
    <div id="calView">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────
let strandData = null;
let currentView = 'list';
let calYear, calMonth;

// ─── Drag & Drop ─────────────────────────────────────────────────────
const dropArea = document.getElementById('dropArea');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => {
  e.preventDefault(); dropArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = ev => tryParse(ev.target.result);
  reader.readAsText(file);
}

document.getElementById('parseBtn').addEventListener('click', () => {
  tryParse(document.getElementById('pasteArea').value.trim());
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('dropZone').style.display = 'block';
  document.getElementById('pasteArea').value = '';
  document.getElementById('errorMsg').style.display = 'none';
  strandData = null;
});

// ─── Parse ───────────────────────────────────────────────────────────
function tryParse(text) {
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  try {
    if (!text) throw new Error('Nothing to parse.');
    const data = JSON.parse(text);
    if (!data.rcal) throw new Error('Missing required "rcal" key.');
    if (!Array.isArray(data.events)) throw new Error('Missing required "events" array.');
    strandData = data;
    render();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

// ─── Render ──────────────────────────────────────────────────────────
function render() {
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('viewer').style.display = 'block';

  const meta = strandData.meta || {};
  document.getElementById('strandTitle').textContent = meta.title || 'Untitled Strand';
  document.getElementById('strandDesc').textContent = meta.description || '';

  // Meta pills
  const metaEl = document.getElementById('strandMeta');
  metaEl.innerHTML = '';
  const add = (label, cls) => {
    const p = document.createElement('span');
    p.className = 'meta-pill' + (cls ? ' ' + cls : '');
    p.textContent = label;
    metaEl.appendChild(p);
  };
  add('rcal v' + strandData.rcal);
  if (meta.type) add(meta.type);
  if (meta.timezone) add(meta.timezone);
  if (meta.live) add('● live', 'live');
  if (meta.location?.city) add(meta.location.city + (meta.location.state ? ', ' + meta.location.state : ''));

  document.getElementById('eventCount').textContent =
    strandData.events.length + ' event' + (strandData.events.length !== 1 ? 's' : '');

  renderList();

  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCal();
}

// ─── Helpers ─────────────────────────────────────────────────────────
function catColor(cat) {
  const map = {
    music:'#4A8FE7', food_drink:'#E3B341', fitness:'#3FB950', arts:'#BC8CFF',
    education:'#58A6FF', community:'#79C0FF', market:'#FFA657', sport:'#FF7B72',
    comedy:'#FFD700', theater:'#D2A8FF', spiritual:'#A5D6FF', maintenance:'#8B949E',
    personal:'#F0883E', general:'#6E7681'
  };
  return map[cat] || '#6E7681';
}

function fmt24(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = h % 12 || 12;
  return hh + (m ? ':' + String(m).padStart(2,'0') : '') + ampm;
}

function schedSummary(ev) {
  if (ev.date) return 'One-off · ' + ev.date;
  const parts = [];
  if (ev.recurrence?.length) {
    ev.recurrence.forEach(r => {
      let s = r.pattern;
      if (r.days?.length) s += ' · ' + r.days.join(', ');
      if (r.time_start) s += ' · ' + fmt24(r.time_start);
      if (r.season_start) s += ' · ' + r.season_start + '–' + (r.season_end || '?');
      parts.push(s);
    });
  }
  if (ev.dates?.length) parts.push('curated dates ×' + ev.dates.length);
  return parts.join(' | ') || 'no schedule';
}

// ─── List View ───────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('listView');
  el.innerHTML = '';
  strandData.events.forEach(ev => {
    const card = document.createElement('div');
    card.className = 'event-card';

    const color = catColor(ev.category);
    const tags = (ev.vibe_tags || []).map(t => `<span class="vibe-tag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="event-card-header">
        <div class="cat-dot" style="background:${color}"></div>
        <div style="flex:1">
          <div class="event-name">${ev.name}</div>
          <div class="event-schedule-summary">${schedSummary(ev)}</div>
          ${tags ? `<div class="event-tags">${tags}</div>` : ''}
        </div>
        <div class="expand-icon">›</div>
      </div>
      <div class="event-card-body">
        ${buildDetailGrid(ev)}
        ${buildOccurrences(ev)}
      </div>`;

    card.querySelector('.event-card-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
    el.appendChild(card);
  });
}

function buildDetailGrid(ev) {
  const rows = [];
  const row = (label, val, mono) => {
    if (val == null || val === '') return;
    rows.push(`<div class="detail-label">${label}</div><div class="detail-value${mono?' mono':''}">${val}</div>`);
  };
  row('id', ev.id, true);
  row('category', ev.category || '—');
  row('price', ev.price ? ev.price + (ev.price_note ? ' · ' + ev.price_note : '') : null);
  if (ev.ticket_url) rows.push(`<div class="detail-label">tickets</div><div class="detail-value"><a href="${ev.ticket_url}" target="_blank" rel="noopener" style="color:var(--blue)">${ev.ticket_url}</a></div>`);
  row('lead time', ev.lead_time_days != null ? ev.lead_time_days + ' day(s)' : null);
  if (ev.description) rows.push(`<div class="detail-label">description</div><div class="detail-value">${ev.description}</div>`);
  if (ev.notes) rows.push(`<div class="detail-label">notes</div><div class="detail-value">${ev.notes}</div>`);
  if (ev.location) {
    const loc = ev.location;
    const locStr = [loc.name, loc.address, loc.city, loc.state].filter(Boolean).join(', ');
    row('location', locStr || null);
  }
  if (!rows.length) return '';
  return `<div class="detail-grid">${rows.join('')}</div>`;
}

function buildOccurrences(ev) {
  const occs = getOccurrences(ev, 12);
  if (!occs.length) return '';
  const today = todayStr();
  const chips = occs.map(o => {
    const past = o.date < today;
    const excType = o.exceptionType;
    let cls = 'occ-chip';
    if (past) cls += ' past';
    if (excType === 'skip' || excType === 'cancelled_range') cls += ' exception';
    if (excType === 'modified') cls += ' modified';
    let label = o.date;
    if (o.time_start) label += ' ' + fmt24(o.time_start);
    if (o.note) label += ' *';
    return `<span class="${cls}" title="${o.note || ''}">${label}</span>`;
  }).join('');
  return `<div class="occurrences-title">Upcoming occurrences</div><div class="occurrence-list">${chips}</div>`;
}

// ─── Calendar View ───────────────────────────────────────────────────
let calViewActive = false;

function setView(v) {
  currentView = v;
  document.getElementById('listView').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('calView').style.display = v === 'cal' ? 'block' : 'none';
  document.getElementById('tabList').classList.toggle('active', v === 'list');
  document.getElementById('tabCal').classList.toggle('active', v === 'cal');
  if (v === 'cal') renderCal();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
}

function renderCal() {
  const label = new Date(calYear, calMonth, 1).toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('calMonthLabel').textContent = label;

  // Build all occurrences for this month
  const allOccs = {};
  strandData.events.forEach(ev => {
    const occs = getOccurrences(ev, 200);
    occs.forEach(o => {
      const [y, m] = o.date.split('-').map(Number);
      if (y === calYear && m - 1 === calMonth) {
        if (!allOccs[o.date]) allOccs[o.date] = [];
        allOccs[o.date].push({ ...o, eventName: ev.name, color: catColor(ev.category) });
      }
    });
  });

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-day-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = todayStr();

  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ day: daysInPrev - i, other: true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, other: false });
  while (cells.length % 7 !== 0) cells.push({ day: cells.length - daysInMonth - firstDay + 1, other: true });

  cells.forEach(c => {
    const cell = document.createElement('div');
    const dateStr = c.other ? null : `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    cell.className = 'cal-cell' + (c.other ? ' other-month' : '') + (dateStr === today ? ' today' : '');
    if (dateStr && allOccs[dateStr]) cell.classList.add('has-events');

    const num = document.createElement('div');
    num.className = 'cal-date-num';
    num.textContent = c.day;
    cell.appendChild(num);

    if (dateStr && allOccs[dateStr]) {
      const items = allOccs[dateStr];
      const max = 3;
      items.slice(0, max).forEach(item => {
        const pill = document.createElement('span');
        pill.className = 'cal-event-pill';
        pill.style.background = item.color;
        pill.textContent = item.eventName;
        if (item.time_start) pill.title = fmt24(item.time_start) + (item.time_end ? '–'+fmt24(item.time_end) : '') + ' · ' + item.eventName;
        pill.addEventListener('mouseenter', e => showTooltip(e, item));
        pill.addEventListener('mouseleave', hideTooltip);
        cell.appendChild(pill);
      });
      if (items.length > max) {
        const more = document.createElement('div');
        more.className = 'cal-more';
        more.textContent = '+' + (items.length - max) + ' more';
        cell.appendChild(more);
      }
    }
    grid.appendChild(cell);
  });
}

function showTooltip(e, item) {
  const t = document.getElementById('tooltip');
  t.innerHTML = `<div class="tooltip-name">${item.eventName}</div>
    <div class="tooltip-detail">${item.date}${item.time_start ? ' · ' + fmt24(item.time_start) : ''}${item.time_end ? '–'+fmt24(item.time_end) : ''}</div>
    ${item.note ? `<div class="tooltip-detail">${item.note}</div>` : ''}`;
  t.style.display = 'block';
  positionTooltip(e);
}
document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').style.display === 'block') positionTooltip(e);
});
function positionTooltip(e) {
  const t = document.getElementById('tooltip');
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 250 > window.innerWidth) x = e.clientX - 260;
  if (y + 100 > window.innerHeight) y = e.clientY - 110;
  t.style.left = x + 'px';
  t.style.top = y + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

// ─── Occurrence Engine ────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getOccurrences(ev, maxFuture) {
  const results = [];
  const today = todayStr();
  const [ty, tm, td] = today.split('-').map(Number);
  const todayDate = new Date(ty, tm - 1, td);

  // One-off
  if (ev.date && !ev.recurrence && !ev.dates) {
    results.push({ date: ev.date, time_start: ev.time_start, time_end: ev.time_end });
  }

  // Curated dates
  if (ev.dates) {
    ev.dates.forEach(d => {
      if (typeof d === 'string') results.push({ date: d, time_start: ev.time_start, time_end: ev.time_end });
      else if (d.date) results.push({ date: d.date, time_start: d.time_start || ev.time_start, time_end: d.time_end || ev.time_end, note: d.note });
    });
  }

  // Recurrence
  if (ev.recurrence) {
    const horizon = new Date(todayDate);
    horizon.setMonth(horizon.getMonth() + 6);
    const start = new Date(todayDate);
    start.setMonth(start.getMonth() - 2);

    ev.recurrence.forEach(rule => {
      const ruleOccs = expandRule(rule, start, horizon);
      ruleOccs.forEach(o => results.push(o));
    });
  }

  // Apply exceptions
  const exceptions = ev.exceptions || [];
  const exMap = {};
  exceptions.forEach(ex => {
    if (ex.type === 'skip' || ex.type === 'modified') exMap[ex.date] = ex;
    if (ex.type === 'cancelled_range') {
      let cur = new Date(ex.date + 'T00:00:00');
      const end = new Date(ex.date_end + 'T00:00:00');
      while (cur <= end) {
        const s = cur.toISOString().slice(0,10);
        exMap[s] = ex;
        cur.setDate(cur.getDate() + 1);
      }
    }
  });

  const final = results.map(o => {
    const ex = exMap[o.date];
    if (!ex) return o;
    if (ex.type === 'skip' || ex.type === 'cancelled_range') return { ...o, exceptionType: ex.type, note: ex.note };
    if (ex.type === 'modified') return { ...o, exceptionType: 'modified', time_start: ex.time_start || o.time_start, time_end: ex.time_end || o.time_end, note: ex.note };
    return o;
  });

  // Sort and return future-focused window
  final.sort((a,b) => a.date.localeCompare(b.date));
  const future = final.filter(o => o.date >= today && o.exceptionType !== 'skip' && o.exceptionType !== 'cancelled_range');
  const past = final.filter(o => o.date < today).slice(-3);
  return [...past, ...future.slice(0, maxFuture)];
}

const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const MON3 = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

function expandRule(rule, start, end) {
  const results = [];
  const every = rule.every || 1;
  const seasonStart = rule.season_start ? MON3[rule.season_start.toLowerCase()] : null;
  const seasonEnd = rule.season_end ? MON3[rule.season_end.toLowerCase()] : null;

  function inSeason(d) {
    if (seasonStart == null) return true;
    const m = d.getMonth();
    if (seasonStart <= seasonEnd) return m >= seasonStart && m <= seasonEnd;
    return m >= seasonStart || m <= seasonEnd; // wraps year
  }

  function addOcc(d) {
    if (!inSeason(d)) return;
    const s = dateStr(d);
    if (rule.start_date && s < rule.start_date) return;
    if (rule.end_date && s > rule.end_date) return;
    results.push({ date: s, time_start: rule.time_start, time_end: rule.time_end });
  }

  function dateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  const p = rule.pattern;

  if (p === 'daily') {
    let cur = new Date(start);
    let count = 0;
    while (cur <= end) {
      if (count % every === 0) addOcc(new Date(cur));
      cur.setDate(cur.getDate() + 1);
      count++;
    }
  } else if (p === 'weekly' || p === 'weekdays') {
    let targetDays;
    if (p === 'weekdays') targetDays = [1,2,3,4,5];
    else {
      const raw = rule.days || [];
      targetDays = raw.flatMap(d => {
        const dl = d.toLowerCase();
        if (dl === 'weekday') return [1,2,3,4,5];
        if (dl === 'weekend') return [0,6];
        const idx = DAYS.indexOf(dl);
        if (idx >= 0) return [idx];
        const s3 = ['sun','mon','tue','wed','thu','fri','sat'];
        const i3 = s3.indexOf(dl.slice(0,3));
        return i3 >= 0 ? [i3] : [];
      });
    }
    // Find start of week
    let cur = new Date(start);
    cur.setDate(cur.getDate() - cur.getDay()); // go to Sunday of start week
    let weekCount = 0;
    while (cur <= end) {
      if (weekCount % every === 0) {
        targetDays.forEach(dow => {
          const d = new Date(cur);
          d.setDate(d.getDate() + dow);
          if (d >= start && d <= end) addOcc(d);
        });
      }
      cur.setDate(cur.getDate() + 7);
      weekCount++;
    }
  } else if (p === 'monthly_date') {
    const dom = rule.month_date;
    let cur = new Date(start.getFullYear(), start.getMonth(), 1);
    let monthCount = 0;
    while (cur <= end) {
      if (monthCount % every === 0) {
        const d = new Date(cur.getFullYear(), cur.getMonth(), dom);
        if (d.getMonth() === cur.getMonth() && d >= start && d <= end) addOcc(d);
      }
      cur.setMonth(cur.getMonth() + 1);
      monthCount++;
    }
  } else if (p === 'monthly_week') {
    const weekMap = {first:0, second:1, third:2, fourth:3, last:-1};
    const which = weekMap[rule.month_week || 'first'];
    const raw = rule.days || [];
    const targetDay = raw.length ? DAYS.indexOf(raw[0].toLowerCase()) : 0;
    let cur = new Date(start.getFullYear(), start.getMonth(), 1);
    while (cur <= end) {
      let d;
      if (which === -1) {
        // Last occurrence
        const lastDay = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
        d = new Date(lastDay);
        while (d.getDay() !== targetDay) d.setDate(d.getDate() - 1);
      } else {
        d = new Date(cur.getFullYear(), cur.getMonth(), 1);
        while (d.getDay() !== targetDay) d.setDate(d.getDate() + 1);
        d.setDate(d.getDate() + which * 7);
        if (d.getMonth() !== cur.getMonth()) { cur.setMonth(cur.getMonth()+1); continue; }
      }
      if (d >= start && d <= end) addOcc(d);
      cur.setMonth(cur.getMonth() + 1);
    }
  } else if (p === 'annual') {
    const dom = rule.month_date;
    const sm = rule.season_start ? MON3[rule.season_start.toLowerCase()] : null;
    for (let y = start.getFullYear(); y <= end.getFullYear(); y++) {
      if (sm != null && dom) {
        const d = new Date(y, sm, dom);
        if (d >= start && d <= end) results.push({ date: dateStr(d), time_start: rule.time_start, time_end: rule.time_end });
      }
    }
  }

  return results;
}
